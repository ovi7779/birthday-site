<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Lebu</title>

<style>

body{
margin:0;
overflow:hidden;
background:pink;
font-family:Arial;
}

/* moving text */

.text{
position:absolute;
color:red;
font-size:22px;
font-weight:bold;
white-space:nowrap;
}

.fade{
animation: fadeout 2s forwards;
pointer-events:none;
}

@keyframes fadeout{
from{opacity:1;}
to{opacity:0;}
}

/* final page */

#finalPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:pink;
opacity:0;
}

.show{
animation: fadein 1s forwards;
}

@keyframes fadein{
from{opacity:0;}
to{opacity:1;}
}

.title{
font-size:60px;
color:red;
font-weight:bold;
}

.subtitle{
font-size:30px;
color:#c2185b;
margin-top:20px;
}

/* surprise button */

#surpriseBtn{
margin-top:40px;
padding:15px 35px;
font-size:24px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.tap{
font-size:14px;
color:#8e004f;
margin-top:5px;
}

/* result text */

#result{
font-size:40px;
color:red;
font-weight:bold;
margin-top:40px;
display:none;
}

/* floating hearts */

.heart{
position:fixed;
bottom:-50px;
animation: floatUp linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div id="finalPage">

<div class="title">❤️ Love You Bulbulir Mammah ❤️</div>
<div class="subtitle">💖ummmmmmmmmmmmmah💖</div>

<button id="surpriseBtn" onclick="showSurprise()">Surprise</button>
<div class="tap">tap here</div>

<div id="result">I promise you to Love You Forever 💖</div>

</div>

<script>

/* create moving texts */

let rows=10;
let cols=10;

let cellW=window.innerWidth/cols;
let cellH=window.innerHeight/rows;

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let text=document.createElement("div");
text.innerText="❤️ Love You Babyyy ❤️";
text.className="text";

let x=c*cellW+Math.random()*(cellW-150);
let y=r*cellH+Math.random()*(cellH-40);

text.style.left=x+"px";
text.style.top=y+"px";

let dx=(Math.random()*120)-60;
let dy=(Math.random()*120)-60;
let duration=2+Math.random()*2;

text.animate([
{transform:"translate(0,0)"},
{transform:`translate(${dx}px,${dy}px)`},
{transform:"translate(0,0)"}
],
{
duration:duration*1000,
iterations:Infinity
});

document.body.appendChild(text);

}
}

/* fade out */

setTimeout(()=>{
document.querySelectorAll(".text").forEach(e=>{
e.classList.add("fade");
});
},3000);

/* remove texts after fade */

setTimeout(()=>{
document.querySelectorAll(".text").forEach(e=>{
e.remove();
});
},5000);

/* show final page */

setTimeout(()=>{
document.getElementById("finalPage").classList.add("show");
startHearts();
},5000);


/* hearts */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤️";

let size=20+Math.random()*60;
heart.style.fontSize=size+"px";

heart.style.left=Math.random()*100+"vw";

let duration=4+Math.random()*4;
heart.style.animationDuration=duration+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},duration*1000);

},300);

}

/* surprise button */

function showSurprise(){

document.getElementById("surpriseBtn").style.display="none";
document.querySelector(".tap").style.display="none";

let r=document.getElementById("result");
r.style.display="block";

}

</script>

</body>

</html>
